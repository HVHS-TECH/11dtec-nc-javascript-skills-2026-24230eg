<!DOCTYPE html>
<html lang="en">

<head>
  <title>T16-arrays continued</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>

<!--*************************************************************
  BODY
**************************************************************-->

<body>
  <h1>T16-arrays continued</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <form onsubmit="return false;">
    <label for="formName">Name:</label>
    <input type="text" id="nameFeild" name="formName">
    <br>
    <label for="formAge">Age:</label>
    <input type="text" id="ageFeild" name="formAge">
    <br>
    <label for="formMoney">Pocket money:</label>
    <input type="text" id="moneyFeild" name="formMoney">
    <br>
    <label for="formChocolate">On a scale of 1-4 how much do you like chocolate:</label>
    <input type="number" id="chocolateSlider" name="formChocolate" min="1" max="4">
    <br>
    <label for="formMilk">How many bottels of milk on the wall?</label>
    <input type="number" id="milkRange" name="formMilk" min="1">
    <br>
    <input type="submit" onclick="getFormInput()">
  </form>
  <br>
  <form onsubmit="return false;">
    <h2>
      Shopping list:
    </h2>
    <label for="formShopingItem">Add an item to your shoping list:</label>
    <br>
    <input type="text" id="itemShopingFeild" name="formShopingItem">
    <br>
    <input type="submit" onclick="getShopingInput()" value="Add to shoping list.">
    <input type="button" onclick="displayShoppingList()" value="Check shopping list.">
  </form>
  <br>
  <div id="spaceForJavaScriptOutput">
  </div>


  <script src="../t16_arrays_continued.js"></script>

</body>

</html>
<!--*************************************************************
  END OF T16_ARRAYS_CONTINUED.HTML
**************************************************************-->
