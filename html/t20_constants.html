<!DOCTYPE html>
<html lang="en">

<head>
  <title>T20-constants</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>

<!--*************************************************************
  BODY
**************************************************************-->

<body>
  <h1>T20-constants</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <form onsubmit="return false;" id="formForm">
    <label for="formName">Name:</label>
    <input type="text" id="nameFeild" name="formName" required>
    <br>
    <label for="formAge">Age:</label>
    <input type="text" id="ageFeild" name="formAge" required>
    <br>
    <label for="formMoney">Pocket money:</label>
    <input type="text" id="moneyFeild" name="formMoney" min="0" required>
    <br>
    <label for="formChocolate">On a scale of 1-4 how much do you like chocolate:</label>
    <input type="number" id="chocolateRange" name="formChocolate" min="1" max="4" required>
    <br>
    <label for="formMilk">How many bottels of milk on the wall?</label>
    <input type="number" id="milkRange" name="formMilk" min="1" required>
    <br>
    <input type="submit" onclick="getFormInput()">
  </form>

  <div id="spaceForJavaScriptOutput">

    The output of your script will go here.

  </div>


  <script src="../t20_constants.js"></script>

</body>

</html>
<!--*************************************************************
  END OF T20_CONSTANTS.HTML
**************************************************************-->
